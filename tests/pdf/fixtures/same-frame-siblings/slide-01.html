<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #FFFFFF;
    }

    body {
      position: relative;
      font-family: Helvetica, Arial, sans-serif;
    }

    h1, p {
      margin: 0;
    }
  </style>
</head>
<body>
  <div
    id="frame"
    style="position: absolute; left: 0; top: 0; width: 960px; height: 540px; background: #F8F5EC;"
  >
    <div style="position: absolute; left: 0; top: 0; width: 96px; height: 96px; background: #E65000;"></div>
    <div style="position: absolute; inset: 0; padding: 40px; box-sizing: border-box;">
      <h1 style="font-size: 44px;">Sibling Preservation</h1>
      <p style="margin-top: 24px; font-size: 26px;">The slide keeps same-frame top-level overlays.</p>
    </div>
  </div>

  <div
    style="position: absolute; left: 720px; top: 56px; width: 180px; height: 92px; background: #0047FF; color: #FFFFFF; padding: 18px; box-sizing: border-box;"
  >
    <p style="font-size: 24px;">Overlay Text</p>
  </div>

  <div
    style="position: absolute; left: 1080px; top: 0; width: 220px; height: 540px; background: #00C853;"
  ></div>
</body>
</html>
