<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>Slide 02</title>
</head>
<body style="width: 720pt; height: 405pt; overflow: hidden; margin: 0; padding: 0; background: #0f0f0f; font-family: 'Pretendard', sans-serif;">
<div style="width: 720pt; height: 405pt; background: #0f0f0f; position: relative; overflow: hidden; box-sizing: border-box; display: flex; flex-direction: row;">

  <!-- Left: Profile Image -->
  <div style="width: 280pt; height: 405pt; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 28pt 18pt; box-sizing: border-box;">
    <div style="width: 220pt; height: 220pt; border-radius: 50%; overflow: hidden; border: 3pt solid #6366f1; box-shadow: 0 0 0 12pt #141419;">
      <img src="profile.jpeg" style="width: 100%; height: 100%; object-fit: cover; object-position: center 24%;">
    </div>
  </div>

  <!-- Right: Info -->
  <div style="flex: 1; padding: 48pt 36pt 36pt 36pt; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box;">

    <h1 style="margin: 0 0 20pt 0; font-size: 32pt; font-weight: 700; color: #ffffff;">김동규</h1>

    <ul style="margin: 0 0 28pt 0; padding: 0 0 0 18pt; list-style: disc;">
      <li style="font-size: 14pt; color: #ffffff; margin-bottom: 10pt; line-height: 1.5;">
        <p style="margin: 0; font-size: 14pt; color: #ffffff;">AutoRAG 개발자 (GitHub ⭐ 4.6k+)</p>
      </li>
      <li style="font-size: 14pt; color: #ffffff; margin-bottom: 10pt; line-height: 1.5;">
        <p style="margin: 0; font-size: 14pt; color: #ffffff;">AI 오픈소스 해커하우스 NomaDamas 리더</p>
      </li>
      <li style="font-size: 14pt; color: #ffffff; margin-bottom: 0; line-height: 1.5;">
        <p style="margin: 0; font-size: 14pt; color: #ffffff;">오픈소스 프로젝트 10개+ 관리</p>
      </li>
    </ul>

    <!-- Project badges -->
    <div style="display: flex; flex-wrap: wrap; gap: 8pt;">
      <p style="margin: 0; font-size: 10pt; font-weight: 500; color: #ffffff; background: #1e1e2a; border: 1pt solid #2a2a3a; border-radius: 12pt; padding: 4pt 12pt;">AutoRAG</p>
      <p style="margin: 0; font-size: 10pt; font-weight: 500; color: #ffffff; background: #1e1e2a; border: 1pt solid #2a2a3a; border-radius: 12pt; padding: 4pt 12pt;">AutoRAG-Research</p>
      <p style="margin: 0; font-size: 10pt; font-weight: 500; color: #ffffff; background: #1e1e2a; border: 1pt solid #2a2a3a; border-radius: 12pt; padding: 4pt 12pt;">ios-moaki</p>
      <p style="margin: 0; font-size: 10pt; font-weight: 500; color: #ffffff; background: #1e1e2a; border: 1pt solid #2a2a3a; border-radius: 12pt; padding: 4pt 12pt;">slides-grab</p>
    </div>

  </div>

</div>

</body></html>
