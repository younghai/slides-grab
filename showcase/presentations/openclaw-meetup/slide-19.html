<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snippet-Gated 스케줄 태스크</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body style="width: 720pt; height: 405pt; overflow: hidden; margin: 0; padding: 0; background: #0f0f0f; font-family: 'Pretendard', sans-serif; color: #ffffff;">
<div style="width: 720pt; height: 405pt; position: relative; overflow: hidden; background: #0f0f0f; padding: 32pt 40pt 28pt 40pt;">

  <!-- Title -->
  <h1 style="font-size: 28pt; font-weight: 700; margin: 0 0 4pt 0; letter-spacing: -0.5pt;">Snippet-Gated 스케줄 태스크</h1>
  <p style="font-size: 14pt; color: #b0b0b0; margin: 0 0 22pt 0;">cron 스케줄링은 OpenClaw에도 있다. 뭐가 다른가?</p>

  <!-- Flow diagram -->
  <div style="display: flex; align-items: flex-start; justify-content: center; gap: 0; margin-bottom: 20pt;">
    <!-- Step 1: Code snippet -->
    <div style="background: #141419; border: 1pt solid #2a2a3a; border-top: 2pt solid #6366f1; border-radius: 8pt; padding: 12pt 16pt; text-align: center; min-width: 100pt;">
      <p style="font-size: 12pt; font-weight: 600; margin: 0;">코드 스니펫</p>
      <p style="font-size: 10pt; color: #b0b0b0; margin: 4pt 0 0 0;">JS / Bash</p>
    </div>
    <p style="margin: 12pt 8pt 0 8pt; font-size: 16pt; color: #6366f1;">→</p>
    <!-- Decision -->
    <div style="text-align: center; min-width: 90pt;">
      <div style="background: #141419; border: 1.5pt solid #6366f1; border-radius: 8pt; padding: 10pt 14pt; transform: rotate(0deg);">
        <p style="font-size: 11pt; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; color: #22d3ee; margin: 0;">return false?</p>
      </div>
      <!-- Two branches -->
      <div style="display: flex; gap: 12pt; margin-top: 8pt;">
        <div style="flex: 1; text-align: center;">
          <p style="font-size: 9pt; color: #b0b0b0; margin: 0 0 4pt 0;">Yes</p>
          <p style="margin: 0; font-size: 14pt; color: #6366f1;">↓</p>
        </div>
        <div style="flex: 1; text-align: center;">
          <p style="font-size: 9pt; color: #b0b0b0; margin: 0 0 4pt 0;">No</p>
          <p style="margin: 0; font-size: 14pt; color: #6366f1;">↓</p>
        </div>
      </div>
      <div style="display: flex; gap: 12pt;">
        <div style="flex: 1; background: #0a2e1f; border: 1pt solid #10b981; border-radius: 6pt; padding: 8pt 6pt;">
          <p style="font-size: 10pt; color: #10b981; margin: 0;">에이전트 호출 X</p>
          <p style="font-size: 9pt; color: #10b981; margin: 2pt 0 0 0; font-weight: 600;">비용 절약!</p>
        </div>
        <div style="flex: 1; background: #141419; border: 1pt solid #2a2a3a; border-radius: 6pt; padding: 8pt 6pt;">
          <p style="font-size: 10pt; margin: 0;">페이로드 주입</p>
          <p style="font-size: 10pt; margin: 2pt 0 0 0;">→ 에이전트 <br>호출</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Example card -->
  <div style="background: #141419; border: 1pt solid #2a2a3a; border-left: 3pt solid #6366f1; border-radius: 8pt; padding: 14pt 20pt; margin-bottom: 10pt;">
    <h4 style="font-size: 12pt; font-weight: 600; margin: 0 0 8pt 0;">예시: GitHub API로 새 이슈 확인</h4>
    <ul style="list-style: none; padding: 0; margin: 0;">
      <li style="font-size: 11pt; color: #b0b0b0; margin-bottom: 4pt; padding-left: 14pt; position: relative;">
        <span style="position: absolute; left: 0;">·</span>
        <p style="margin: 0;">없으면 → <span style="color: #10b981; font-weight: 600;">skip (비용 $0)</span></p>
      </li>
      <li style="font-size: 11pt; color: #b0b0b0; padding-left: 14pt; position: relative;">
        <span style="position: absolute; left: 0;">·</span>
        <p style="margin: 0;">있으면 → 이슈 내용과 함께 PM 에이전트 호출</p>
      </li>
    </ul>
  </div>

  <!-- Small note -->
  <p style="font-size: 10pt; color: #4a4a5a; text-align: center; margin: 0;">45초 타임아웃 · 에러 시 자동 수정 에이전트 실행</p>

  <!-- Page number -->
  <p style="position: absolute; bottom: 16pt; right: 24pt; font-size: 10pt; color: #4a4a5a; margin: 0;">19</p>

</div>

</body></html>
