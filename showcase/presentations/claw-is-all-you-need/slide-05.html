<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Slide 05 — New interface</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;800&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#050510;}
  .slide{position:relative; width:720pt; height:405pt; overflow:hidden;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1pt, transparent 1pt 3pt),
      radial-gradient(420pt 280pt at 80% 50%, rgba(255,45,94,0.26), transparent 70%),
      radial-gradient(420pt 280pt at 20% 50%, rgba(59,143,245,0.26), transparent 70%),
      #050510;
    color:#E8E8F5; font-family:'DM Mono','Noto Sans KR',monospace;}
  .slide::before{content:""; position:absolute; right:6pt; top:104pt; width:200pt; height:200pt;
    background:#FF2D5E; filter:blur(60pt); opacity:0.5; mix-blend-mode:screen; border-radius:50%; pointer-events:none;}
  .slide::after{content:""; position:absolute; left:6pt; top:104pt; width:200pt; height:200pt;
    background:#3B8FF5; filter:blur(60pt); opacity:0.5; mix-blend-mode:screen; border-radius:50%; pointer-events:none;}
  .wrap{position:absolute; inset:0; padding:36pt 50pt; display:flex; flex-direction:column; justify-content:center;}
  .kicker{font-family:'DM Mono',monospace; font-size:10pt; letter-spacing:4pt; color:#8a8ab0; text-transform:uppercase; margin:0;}
  .lead{font-family:'Noto Sans KR',sans-serif; font-weight:700; font-size:16pt; color:#D0D0F0; margin:8pt 0 20pt;}
  .row{display:grid; grid-template-columns:1fr 1fr 1fr; gap:16pt;}
  .if{border:1pt solid rgba(255,255,255,0.15); border-radius:12pt; padding:22pt 14pt; text-align:center;
    background:rgba(10,10,30,0.55);}
  .if .icon{font-size:30pt; margin:0 0 6pt;}
  .if .name{font-family:'Bebas Neue',sans-serif; font-size:26pt; letter-spacing:3pt; margin:0;}
  .if .kr{font-family:'Noto Sans KR',sans-serif; font-size:11pt; color:#D0D0F0; margin:4pt 0 0;}
  .claw{border:2pt solid transparent;
    background: linear-gradient(#0a0a20,#0a0a20) padding-box,
                linear-gradient(135deg,#FF2D5E,#3B8FF5) border-box;
    box-shadow:0 0 30pt rgba(255,45,94,0.3), 0 0 30pt rgba(59,143,245,0.3);}
  .claw .name{background:linear-gradient(100deg,#FF2D5E 0%,#ffffff 50%,#3B8FF5 100%); -webkit-background-clip:text; background-clip:text; color:transparent; font-size:36pt;}
  .claw .icon{filter:drop-shadow(0 0 10pt rgba(255,255,255,0.6));}
  .caption{margin-top:24pt; text-align:center; font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:20pt; letter-spacing:2pt; color:#ffffff;}
  .caption b{background:linear-gradient(90deg,#FF2D5E,#3B8FF5); -webkit-background-clip:text; background-clip:text; color:transparent;}
</style>
</head>
<body>
<div class="slide">
  <div class="wrap">
    <p class="kicker">// New interface</p>
    <p class="lead">Interfaces evolve — web, mobile, and now…</p>
    <div class="row">
      <div class="if">
        <p class="icon">🖥</p>
        <p class="name">WEB</p>
        <p class="kr">Webpages</p>
      </div>
      <div class="if">
        <p class="icon">📱</p>
        <p class="name">MOBILE</p>
        <p class="kr">Mobile apps</p>
      </div>
      <div class="if claw">
        <p class="icon">🦾</p>
        <p class="name">CLAW</p>
        <p class="kr">Agents</p>
      </div>
    </div>
    <p class="caption">Claw is <b>a new interface</b>.</p>
  </div>
</div>
</body>
</html>
