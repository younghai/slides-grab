<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Slide 10 — Product first</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;800&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#050510;}
  .slide{position:relative; width:720pt; height:405pt; overflow:hidden;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1pt, transparent 1pt 3pt),
      radial-gradient(400pt 260pt at 25% 25%, rgba(255,45,94,0.22), transparent 70%),
      radial-gradient(420pt 280pt at 80% 80%, rgba(59,143,245,0.28), transparent 70%),
      #050510;
    color:#E8E8F5; font-family:'DM Mono','Noto Sans KR',monospace;}
  .slide::before{content:""; position:absolute; left:6pt; top:6pt; width:200pt; height:200pt;
    background:#FF2D5E; filter:blur(60pt); opacity:0.5; mix-blend-mode:screen; border-radius:50%; pointer-events:none;}
  .slide::after{content:""; position:absolute; right:6pt; bottom:6pt; width:200pt; height:200pt;
    background:#3B8FF5; filter:blur(60pt); opacity:0.55; mix-blend-mode:screen; border-radius:50%; pointer-events:none;}
  .wrap{position:absolute; inset:0; padding:36pt 52pt; display:flex; flex-direction:column; justify-content:center;}
  .kicker{font-family:'DM Mono',monospace; font-size:10pt; letter-spacing:4pt; color:#8a8ab0; text-transform:uppercase; margin:0;}
  .before{font-family:'DM Mono',monospace; font-size:11pt; letter-spacing:3pt; color:#FF2D5E; margin:10pt 0 8pt;}
  .strike{font-family:'Bebas Neue',sans-serif; font-size:32pt; letter-spacing:3pt; color:#8a8ab0; text-decoration:line-through; text-decoration-color:rgba(255,45,94,0.7); text-decoration-thickness:3pt; margin:0;}
  .main{font-family:'Noto Sans KR',sans-serif; font-weight:900; font-size:28pt; line-height:1.4; letter-spacing:-1pt; margin:16pt 0 0; color:#E8E8F5;}
  .main em{font-style:normal;
    background:linear-gradient(100deg,#FF2D5E 0%,#ffffff 50%,#3B8FF5 100%); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 22pt rgba(255,255,255,0.18);}
  .gloss{margin:18pt 0 0; font-family:'Barlow Condensed',sans-serif; font-weight:400; font-size:15pt; letter-spacing:1pt; color:#D0D0F0; max-width:560pt;}
  .ax{display:inline-block; padding:2pt 8pt; border:1pt solid rgba(255,45,94,0.5); border-radius:4pt; font-family:'DM Mono',monospace; font-size:10pt; color:#FF8FA8; letter-spacing:2pt;}
  .native{display:inline-block; padding:2pt 8pt; border:1pt solid rgba(59,143,245,0.5); border-radius:4pt; font-family:'DM Mono',monospace; font-size:10pt; color:#7FC0FF; letter-spacing:2pt;}
</style>
</head>
<body>
<div class="slide">
  <div class="wrap">
    <p class="kicker">// Order of operations</p>
    <p class="before">WAIT — there's something you have to do first.</p>
    <p class="strike">AX (Agent eXperience)</p>
    <p class="main">What comes first is,<br>making <em>your product Agent-native</em>.</p>
    <p class="gloss">Before <span class="ax">AX</span> that transforms the org, rewriting the product as <span class="native">Agent-native</span> comes first.</p>
  </div>
</div>
</body>
</html>
