<style>

  html,body{margin:0;padding:0;background:#050510;}
  .slide{position:relative; width:720pt; height:405pt; overflow:hidden;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1pt, transparent 1pt 3pt),

  .taegeuk{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);

    filter:blur(2pt);}
  .wrap{position:absolute; inset:0; padding:54pt 60pt; display:flex; flex-direction:column; justify-content:center; text-align:center;}
  .chapter{font-family:'DM Mono',monospace; font-size:10pt; letter-spacing:6pt; color:#D0D0F0; text-transform:uppercase; margin:0;}
  h1{font-family:'Bebas Neue',sans-serif; font-size:82pt; line-height:1.4; letter-spacing:4pt; margin:14pt 0 0;
    background:linear-gradient(100deg,#FF2D5E 0%,#ffffff 50%,#3B8FF5 100%); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 36pt rgba(255,255,255,0.18);}
  .kr{margin:12pt 0 0; font-family:'Noto Sans KR',sans-serif; font-weight:700; font-size:18pt; letter-spacing:2pt; color:#E8E8F5;}
  .caption{margin:16pt 0 0; font-family:'Barlow Condensed',sans-serif; font-weight:400; font-size:14pt; letter-spacing:3pt; color:#8a8ab0;}
