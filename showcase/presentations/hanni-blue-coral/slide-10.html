<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>Closing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: linear-gradient(135deg, #FFF0F5 0%, #E8F4FD 50%, #FFF5F9 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    padding: 48pt;
  }
  h1 {
    font-size: 28pt;
    font-weight: 700;
    color: #1A1A2E;
    letter-spacing: -0.02em;
    line-height: 1.6;
  }
  h1 span.pink {
    color: #FF69B4;
  }
  h1 span.blue {
    color: #89CFF0;
  }
  p.closing-sub {
    font-size: 13pt;
    font-weight: 400;
    color: #8B8FA3;
    margin-top: 28pt;
  }
  p.tag {
    font-size: 10pt;
    font-weight: 500;
    color: #C0C0C0;
    letter-spacing: 0.06em;
    margin-top: 48pt;
  }
</style>
</head>
<body>
  <h1>한 곡의 노래가<br><span class="pink">세대</span>를 넘고, <span class="blue">바다</span>를 건넜다</h1>
  <p class="closing-sub">NewJeans Hanni × 푸른 산호초 (青い珊瑚礁)</p>
  <p class="tag">Thank you</p>
</body>
</html>
