<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>한일을 잇다</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', sans-serif;
    background: #F0F4FF;
    padding: 44pt 64pt;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
  }
  h2 {
    font-size: 11pt;
    font-weight: 700;
    color: #89CFF0;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20pt;
  }
  p.quote-mark {
    font-size: 36pt;
    color: #FF69B4;
    line-height: 1.2;
    margin-bottom: 8pt;
  }
  h1 {
    font-size: 17pt;
    font-weight: 400;
    color: #1A1A2E;
    line-height: 1.8;
    max-width: 520pt;
    letter-spacing: -0.01em;
  }
  p.attr-name {
    font-size: 13pt;
    font-weight: 600;
    color: #1A1A2E;
    margin-top: 24pt;
  }
  p.attr-desc {
    font-size: 11pt;
    font-weight: 400;
    color: #8B8FA3;
    margin-top: 4pt;
  }
  p.footer-note {
    font-size: 10pt;
    color: #8B8FA3;
    font-weight: 400;
    margin-top: 20pt;
  }
  p.footer-note span {
    color: #FF69B4;
  }
</style>
</head>
<body>
  <h2>Across Borders</h2>
  <p class="quote-mark">"</p>
  <h1>하니의 노래를 듣고<br>하루하루가 빛나던 44년 전을 기억했습니다.<br>감동과 용기를 주셔서 고맙습니다.<br>최선을 다해 암을 이겨내겠습니다.</h1>
  <p class="attr-name">61세 일본 남성</p>
  <p class="attr-desc">YouTube 댓글</p>
  <p class="footer-note">한국 누리꾼들의 응원 — <span>세대와 국경을 넘은 연대</span></p>
</body>
</html>
