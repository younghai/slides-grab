<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .viewer-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav-bar {
      height: 48px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-bar button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .nav-bar button:hover {
      background: #555;
    }

    .nav-bar button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .slide-counter {
      color: #aaa;
      font-size: 14px;
      font-weight: 500;
      min-width: 60px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .btn-fullscreen {
      position: absolute;
      right: 16px;
      background: transparent !important;
      font-size: 18px;
      padding: 6px 10px !important;
    }

    .slide-viewport {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .slide-scaler {
      width: 720pt;
      height: 405pt;
      position: relative;
      transform-origin: center center;
    }

    .slide-frame {
      position: absolute;
      inset: 0;
      width: 720pt;
      height: 405pt;
      border: none;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .slide-frame.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div class="viewer-container">
    <div class="nav-bar">
      <button id="btn-prev" title="Previous (\u2190)">Prev</button>
      <span class="slide-counter" id="counter">1 / 5</span>
      <button id="btn-next" title="Next (\u2192)">Next</button>
      <button class="btn-fullscreen" id="btn-fs" title="Fullscreen (F)">&#x26F6;</button>
    </div>

    <div class="slide-viewport" id="viewport">
      <div class="slide-scaler" id="scaler">

<script>
(() => {
  const slideFile = &quot;slide-01.html&quot;;
  const localAssetPrefix = &quot;./assets/&quot;;
  const absolutePathRe = /^(file:\/\/|\/Users\/|\/home\/|\/var\/|\/tmp\/|\/private\/|\/Volumes\/|[A-Za-z]:[\\/]|\\\\)/i;
  const schemeRe = /^[a-z][a-z0-9+\-.]*:/i;
  const prefix = '[slides-grab:image]';

  function describeElement(element) {
    if (!element || element.nodeType !== Node.ELEMENT_NODE) return '';
    if (element === document.body) return 'body';

    const parts = [];
    let current = element;
    while (current &amp;&amp; current.nodeType === Node.ELEMENT_NODE &amp;&amp; current !== document.body) {
      let part = current.tagName.toLowerCase();
      if (current.id) {
        part += '#' + current.id;
        parts.unshift(part);
        break;
      }
      if (current.classList.length > 0) {
        part += '.' + Array.from(current.classList).slice(0, 2).join('.');
      }
      parts.unshift(part);
      current = current.parentElement;
    }
    return 'body > ' + parts.join(' > ');
  }

  function warn(message, detail) {
    console.warn(prefix + ' ' + slideFile + ': ' + message, detail);
  }

  function fail(message, detail) {
    console.error(prefix + ' ' + slideFile + ': ' + message, detail);
  }

  function validateAssetSource(kind, source, { allowEmpty = true, onNoncanonical = 'warn' } = {}) {
    const value = (source || '').trim();
    if (!value) {
      return allowEmpty;
    }
    if (value.startsWith('data:')) {
      return true;
    }
    if (value.startsWith('https://')) {
      fail('remote ' + kind + ' URL is unsupported in saved slides; download it into ./assets/<file>', { src: value });
      return false;
    }
    if (value.startsWith('http://')) {
      fail('remote http:// ' + kind + ' URL is unsupported in saved slides; download it into ./assets/<file>', { src: value });
      return false;
    }
    if (absolutePathRe.test(value) || value.startsWith('/')) {
      fail('non-portable ' + kind + ' path is unsupported', { src: value });
      return false;
    }
    if (schemeRe.test(value)) {
      fail('unsupported ' + kind + ' URL scheme in saved slides; download it into ./assets/<file>', { src: value });
      return false;
    }
    if (!value.startsWith(localAssetPrefix)) {
      const report = onNoncanonical === 'fail' ? fail : warn;
      report('noncanonical local ' + kind + ' path should use ./assets/<file>', { src: value });
    }
    return true;
  }

  function getVideoSources(video) {
    const sources = [];
    const directSrc = (video.getAttribute('src') || '').trim();
    if (directSrc) {
      sources.push(directSrc);
    }
    for (const source of video.querySelectorAll('source[src]')) {
      const src = (source.getAttribute('src') || '').trim();
      if (src) {
        sources.push(src);
      }
    }
    return sources;
  }

  window.addEventListener('error', (event) => {
    const target = event.target;
    if (target instanceof HTMLImageElement) {
      const src = (target.getAttribute('src') || target.currentSrc || '').trim();
      if (!src || src.startsWith('data:')) return;
      if (src.startsWith(localAssetPrefix)) {
        fail('missing local asset', { src });
        return;
      }
      fail('image failed to load', { src });
      return;
    }

    if (target instanceof HTMLVideoElement) {
      const sources = getVideoSources(target);
      if (sources.some((src) => src.startsWith(localAssetPrefix))) {
        fail('missing local video asset', { sources });
        return;
      }
      fail('video failed to load', { sources });
      return;
    }

    if (target instanceof HTMLSourceElement &amp;&amp; target.parentElement instanceof HTMLVideoElement) {
      const src = (target.getAttribute('src') || '').trim();
      if (!src) return;
      if (src.startsWith(localAssetPrefix)) {
        fail('missing local video asset', { src });
        return;
      }
      fail('video source failed to load', { src });
    }
  }, true);

  window.addEventListener('DOMContentLoaded', () => {
    for (const image of document.querySelectorAll('img[src]')) {
      const src = (image.getAttribute('src') || '').trim();
      validateAssetSource('image', src);
    }

    for (const video of document.querySelectorAll('video')) {
      for (const src of getVideoSources(video)) {
        validateAssetSource('video', src);
      }

      const poster = (video.getAttribute('poster') || '').trim();
      if (poster) {
        validateAssetSource('image', poster);
      }
    }

    for (const element of document.body.querySelectorAll('*')) {
      if (element === document.body) continue;
      const backgroundImage = window.getComputedStyle(element).backgroundImage;
      if (!backgroundImage || backgroundImage === 'none' || !backgroundImage.includes('url(')) continue;
      fail('non-body background-image is not supported for slide content', {
        element: describeElement(element),
        backgroundImage,
      });
    }
  });
})();
</script>

    while (current &amp;&amp; current.nodeType === Node.ELEMENT_NODE &amp;&amp; current !== document.body) {

      if (current.classList.length > 0) {
        part += '.' + Array.from(current.classList).slice(0, 2).join('.');
      }
      parts.unshift(part);
      current = current.parentElement;
    }

  function warn(message, detail) {

  function validateAssetSource(kind, source, { allowEmpty = true, onNoncanonical = 'warn' } = {}) {
    const value = (source || '').trim();
    if (!value) {
      return allowEmpty;

      return true;

      fail('non-portable ' + kind + ' path is unsupported', { src: value });
      return false;
    }
    if (schemeRe.test(value)) {
      fail('unsupported ' + kind + ' URL scheme in saved slides; download it into ./assets/<file>', { src: value });

  <script>
    const TOTAL = 5;
    let current = 1;

    const frames = document.querySelectorAll('.slide-frame');
    const counter = document.getElementById('counter');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const scaler = document.getElementById('scaler');
    const viewport = document.getElementById('viewport');

    function goTo(n) {
      n = Math.max(1, Math.min(TOTAL, n));
      if (n === current) return;
      frames[current - 1].classList.remove('active');
      current = n;
      frames[current - 1].classList.add('active');
      counter.textContent = current + ' / ' + TOTAL;
      btnPrev.disabled = current === 1;
      btnNext.disabled = current === TOTAL;
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    btnPrev.addEventListener('click', prev);
    btnNext.addEventListener('click', next);
    btnPrev.disabled = true;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
      else if (e.key === 'Home') { e.preventDefault(); goTo(1); }
      else if (e.key === 'End') { e.preventDefault(); goTo(TOTAL); }
      else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        toggleFullscreen();
      }
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }
    document.getElementById('btn-fs').addEventListener('click', toggleFullscreen);

    function rescale() {
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      const slideW = scaler.offsetWidth;
      const slideH = scaler.offsetHeight;
      const scale = Math.min(vw / slideW, vh / slideH) * 0.95;
      scaler.style.transform = 'scale(' + scale + ')';
    }

    window.addEventListener('resize', rescale);
    document.addEventListener('fullscreenchange', () => setTimeout(rescale, 100));
    rescale();
  </script>
