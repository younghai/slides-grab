<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      overflow: hidden;
      position: relative;
      background: linear-gradient(160deg, #0a0a2e 0%, #1a1040 50%, #2a0a20 100%);
    }
    .blob {
      position: absolute; width: 280pt; height: 280pt;
      bottom: 0; left: 0;
      background: radial-gradient(circle, rgba(34,197,94,0.2), transparent 70%);
      border-radius: 50%;
    }
    .blob2 {
      position: absolute; width: 200pt; height: 200pt;
      top: 0; right: 0;
      background: radial-gradient(circle, rgba(168,85,247,0.15), transparent 70%);
      border-radius: 50%;
    }

    .header {
      position: absolute; top: 32pt; left: 48pt; right: 48pt;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-badge {
      padding: 5pt 14pt;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10pt);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16pt;
      font-size: 9pt; font-weight: 600; color: rgba(255,255,255,0.7);
      letter-spacing: 0.08em;
    }
    .page-num {
      font-size: 10pt; color: rgba(255,255,255,0.3); font-weight: 500;
    }

    .center-content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20pt;
    }

    .emoji-large { font-size: 48pt; line-height: 1; }
    .skill-title {
      font-size: 34pt; font-weight: 800; color: #fff;
      letter-spacing: -0.02em;
    }
    .skill-desc {
      font-size: 15pt; color: rgba(255,255,255,0.6); line-height: 1.6;
    }

    .glass-info {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20pt);
      -webkit-backdrop-filter: blur(20pt);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18pt;
      padding: 20pt 32pt;
      display: flex;
      gap: 40pt;
      align-items: center;
    }

    .info-item {
      display: flex; flex-direction: column; align-items: center; gap: 6pt;
    }
    .info-icon { font-size: 22pt; }
    .info-label {
      font-size: 10pt; font-weight: 600; color: rgba(255,255,255,0.8);
    }
    .info-sub {
      font-size: 8pt; color: rgba(255,255,255,0.4);
    }

    .divider {
      width: 1px; height: 40pt;
      background: rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div class="blob"></div>
  <div class="blob2"></div>

  <div class="header">
    <span class="header-badge">SKILL 06</span>
    <span class="page-num">08</span>
  </div>

  <div class="center-content">
    <div class="emoji-large">🗑️</div>
    <h1 class="skill-title">생활 쓰레기 배출 정보</h1>
    <p class="skill-desc">우리 동네 쓰레기 배출 요일·시간·장소를<br>에이전트에게 물어보세요</p>

    <div class="glass-info">
      <div class="info-item">
        <span class="info-icon">📅</span>
        <span class="info-label">배출 요일</span>
        <span class="info-sub">지역별 수거일</span>
      </div>
      <div class="divider"></div>
      <div class="info-item">
        <span class="info-icon">🕐</span>
        <span class="info-label">배출 시간</span>
        <span class="info-sub">정확한 시간대</span>
      </div>
      <div class="divider"></div>
      <div class="info-item">
        <span class="info-icon">📍</span>
        <span class="info-label">배출 장소</span>
        <span class="info-sub">지정 배출 위치</span>
      </div>
    </div>
  </div>
</body>
</html>
