<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      overflow: hidden;
      position: relative;
      background: linear-gradient(160deg, #0a0a2e 0%, #1a1040 50%, #2a0a20 100%);
    }
    .blob {
      position: absolute; width: 280pt; height: 280pt;
      top: 0; left: 0;
      background: radial-gradient(circle, rgba(251,146,60,0.2), transparent 70%);
      border-radius: 50%;
    }
    .blob2 {
      position: absolute; width: 240pt; height: 240pt;
      bottom: 0; right: 0;
      background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%);
      border-radius: 50%;
    }

    .header {
      position: absolute; top: 32pt; left: 48pt; right: 48pt;
      display: flex; justify-content: space-between; align-items: center;
    }
    .header-badge {
      padding: 5pt 14pt;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10pt);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16pt;
      font-size: 9pt; font-weight: 600; color: rgba(255,255,255,0.7);
      letter-spacing: 0.08em;
    }
    .page-num {
      font-size: 10pt; color: rgba(255,255,255,0.3); font-weight: 500;
    }

    .center-content {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20pt;
    }

    .emoji-large { font-size: 48pt; line-height: 1; }
    .skill-title {
      font-size: 36pt; font-weight: 800; color: #fff;
      letter-spacing: -0.02em;
    }
    .skill-desc {
      font-size: 16pt; color: rgba(255,255,255,0.6); line-height: 1.6;
    }

    .glass-row {
      display: flex; gap: 16pt; margin-top: 8pt;
    }
    .glass-chip {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(16pt);
      -webkit-backdrop-filter: blur(16pt);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14pt;
      padding: 14pt 20pt;
      display: flex; flex-direction: column; align-items: center; gap: 6pt;
    }
    .chip-icon { font-size: 20pt; }
    .chip-text {
      font-size: 10pt; font-weight: 600; color: rgba(255,255,255,0.8);
    }
    .chip-sub {
      font-size: 8pt; color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="blob"></div>
  <div class="blob2"></div>

  <div class="header">
    <span class="header-badge">SKILL 05</span>
    <span class="page-num">07</span>
  </div>

  <div class="center-content">
    <div class="emoji-large">📰</div>
    <h1 class="skill-title">긱뉴스 조회</h1>
    <p class="skill-desc">한국의 해커뉴스, 긱뉴스를<br>에이전트로 손쉽게 조회합니다</p>

    <div class="glass-row">
      <div class="glass-chip">
        <span class="chip-icon">🔍</span>
        <span class="chip-text">키워드 검색</span>
        <span class="chip-sub">관심 주제 빠르게</span>
      </div>
      <div class="glass-chip">
        <span class="chip-icon">📋</span>
        <span class="chip-text">최신 게시물</span>
        <span class="chip-sub">RSS 피드 기반</span>
      </div>
      <div class="glass-chip">
        <span class="chip-icon">📖</span>
        <span class="chip-text">상세 확인</span>
        <span class="chip-sub">원문 바로 읽기</span>
      </div>
    </div>
  </div>
</body>
</html>
