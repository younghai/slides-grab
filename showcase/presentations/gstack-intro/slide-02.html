<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>Slide 02</title>

<body style="width: 720pt; height: 405pt; overflow: hidden; margin: 0; padding: 0; background: #0a0a0a; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;">
<div style="width: 720pt; height: 405pt; background: #0a0a0a; position: relative; overflow: hidden; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; padding: 48pt 72pt;">

  <h1 style="margin: 0 0 32pt 0; font-size: 32pt; font-weight: 700; color: #ffffff; letter-spacing: -0.02em; line-height: 1.3;">Shipping production code solo<br>is brutally hard.</h1>

  <div style="display: flex; flex-direction: column; gap: 18pt;">
    <div style="display: flex; align-items: flex-start; gap: 14pt;">
      <div style="min-width: 6pt; height: 6pt; background: #ef4444; border-radius: 50%; margin-top: 8pt;"></div>
      <p style="margin: 0; font-size: 16pt; font-weight: 400; color: #a0a0a0; line-height: 1.5;">Code review, security audits, QA testing — each one demands a specialist.</p>
    </div>
    <div style="display: flex; align-items: flex-start; gap: 14pt;">
      <div style="min-width: 6pt; height: 6pt; background: #ef4444; border-radius: 50%; margin-top: 8pt;"></div>
      <p style="margin: 0; font-size: 16pt; font-weight: 400; color: #a0a0a0; line-height: 1.5;">Architecture decisions pile up with no one to challenge them.</p>
    </div>
    <div style="display: flex; align-items: flex-start; gap: 14pt;">
      <div style="min-width: 6pt; height: 6pt; background: #ef4444; border-radius: 50%; margin-top: 8pt;"></div>
      <p style="margin: 0; font-size: 16pt; font-weight: 400; color: #a0a0a0; line-height: 1.5;">The bottleneck isn't coding — it's everything else around it.</p>
    </div>
  </div>

  <p style="margin: 36pt 0 0 0; font-size: 14pt; font-weight: 600; color: #6366f1;">You need a team. Or something that acts like one.</p>

</div>
</body></html>
