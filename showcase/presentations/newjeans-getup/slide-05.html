<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0020C2;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .rainbow-bar {
      width: 100%;
      height: 7pt;
      background: linear-gradient(90deg, #FF0000, #FF7700, #FFFF00, #00FF00, #0000FF, #8B00FF);
      flex-shrink: 0;
    }
    .content {
      flex: 1;
      padding: 20pt 44pt;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h2 {
      font-family: Impact, 'Pretendard', sans-serif;
      font-size: 26pt;
      color: #FFFFFF;
      text-shadow: 2px 2px 0 #00FFFF, 4px 4px 0 #FF00FF;
      text-transform: uppercase;
      margin-bottom: 18pt;
      text-align: center;
    }
    .video-container {
      width: 460pt;
      height: 255pt;
      border-radius: 8pt;
      overflow: hidden;
      border: 2.5pt solid #FFFF00;
      box-shadow: 0 0 20pt rgba(255, 255, 0, 0.25), 0 0 40pt rgba(255, 0, 255, 0.15);
      position: relative;
      background: #000;
    }
    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .caption {
      font-size: 10pt;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 12pt;
      text-align: center;
    }
    .star { color: #FFFF00; }
  </style>
</head>
<body>
  <div class="rainbow-bar"></div>
  <div class="content">
    <h2><span class="star">&#10022;</span> Super Shy &mdash; Official MV <span class="star">&#10022;</span></h2>
    <div class="video-container">
      <video controls preload="metadata" poster="./assets/super-shy-mv-poster.jpg">
        <source src="./assets/super-shy-mv.mp4" type="video/mp4">
      </video>
    </div>
    <p class="caption">YouTube 2억뷰 돌파 &middot; Get Up 대표 뮤직비디오</p>
  </div>
  <div class="rainbow-bar"></div>
</body>
</html>
