<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slide 09 — 덕트 테이프 모델</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 720pt; height: 405pt;
    background: #F5F500;
    color: #000000;
    font-family: 'Pretendard', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .frame {
    position: absolute;
    inset: 0;
    padding: 16pt 26pt;
    box-sizing: border-box;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 10pt;
  }
  .question-tag {
    font-family: 'Space Mono', monospace;
    font-weight: 700; font-size: 10pt;
    text-transform: uppercase; letter-spacing: 1pt;
    background: #000000; color: #F5F500;
    padding: 3pt 8pt;
    align-self: flex-start;
  }
  h1 {
    margin: 0; font-weight: 900;
    font-size: 32pt; line-height: 1.2;
    letter-spacing: -1pt;
    padding-bottom: 4pt;
  }
  h1 .accent {
    background: #FF2D55; color: #FFFFFF;
    padding: 0 6pt;
    border: 3pt solid #000000;
    box-shadow: 4pt 4pt 0 #000000;
    display: inline-block;
    transform: rotate(-1deg);
    line-height: 1.2;
  }
  h1 small {
    display: block;
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    font-size: 11pt;
    margin-top: 5pt;
    letter-spacing: 0;
  }
</style>
</head>
<body>
  <div class="frame">
    <span class="question-tag">Open Question</span>

    <h1>덕트 테이프 모델 = <span class="accent">gpt-image-2</span><small>2026.04.21 출시 · 한글 텍스트 99%+ 렌더링 · Thinking 모드 · 캐릭터 일관성</small></h1>

  </div>
</body>
</html>
