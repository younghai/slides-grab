<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Slide 01 — Cover</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 720pt; height: 405pt;
    background: #F5F500;
    color: #000000;
    font-family: 'Pretendard', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .frame {
    position: absolute;
    inset: 0;
    border: 6pt solid #000000;
    box-sizing: border-box;
    padding: 22pt 28pt;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-family: 'Space Mono', monospace;
    font-size: 10pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5pt;
  }
  .badge {
    background: #000000;
    color: #F5F500;
    padding: 3pt 8pt;
    border: 2pt solid #000000;
  }
  h1 {
    margin: 0;
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 56pt;
    line-height: 1.1;
    letter-spacing: -1.5pt;
    padding-bottom: 4pt;
  }
  .accent {
    display: inline-block;
    background: #FF2D55;
    color: #FFFFFF;
    padding: 0 6pt;
    transform: rotate(-1.5deg);
    box-shadow: 4pt 4pt 0 #000000;
    border: 3pt solid #000000;
    margin: 0 2pt;
    line-height: 1.05;
  }
  .subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 11pt;
    font-weight: 400;
    margin: 10pt 0 0;
  }
  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: 'Space Mono', monospace;
    font-size: 10pt;
    font-weight: 700;
    text-transform: uppercase;
  }
  .speaker {
    background: #FFFFFF;
    border: 3pt solid #000000;
    padding: 6pt 10pt;
    box-shadow: 4pt 4pt 0 #000000;
  }
  .meta-right {
    text-align: right;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="frame">
    <div class="top-row">
      <div class="badge">Lightning Talk</div>
      <div>HARNESS // BEYOND CODING</div>
    </div>
    <div>
      <h1>하네스를 코딩에만<br><span class="accent">쓰고</span> 계십니까?</h1>
      <p class="subtitle">Are you using your harness only for coding?</p>
    </div>
    <div class="bottom-row">
      <div class="speaker">김동규 / Kim Dong-Kyu</div>
      <div class="meta-right">OMOCON SEOUL<br>2024.04.25</div>
    </div>
  </div>
</body>
</html>
