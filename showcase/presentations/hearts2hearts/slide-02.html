<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>Slide 02</title>
<style>
  * { box-sizing: border-box; }
  body { width: 720pt; height: 405pt; overflow: hidden; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: #FFF8FC; color: #171217; }
  .slide { width: 720pt; height: 405pt; position: relative; overflow: hidden; background: #FFF8FC; }
  .kicker { font-size: 8.5pt; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #FF5FA2; margin: 0; }
  .title { display:block; font-size: 25pt; line-height: 1.18; letter-spacing: -0.03em; font-weight: 800; margin: 0; color: #171217; padding-bottom: 4pt; }
  .subtitle { font-size: 11pt; line-height: 1.45; color: #6E6371; margin: 0; }
  .chip { display: inline-flex; align-items: center; justify-content: center; padding: 5pt 11pt; border-radius: 999pt; background: #FFFFFF; border: 1pt solid #F1D7E4; }
  .chip p { margin: 0; font-size: 8.5pt; font-weight: 600; color: #6A5260; }
  .footer-note { position: absolute; left: 28pt; bottom: 16pt; font-size: 7.5pt; color: #8A7A85; margin: 0; }
  .photo { width: 100%; height: 100%; object-fit: cover; display: block; }
  .dot { width: 7pt; height: 7pt; border-radius: 50%; background: #FF5FA2; }
</style>
</head>
<body>

<div class="slide">
  <div style="position:absolute; inset:0; background:#FFF8FC;"></div>
  <div style="position:absolute; left:28pt; top:28pt; width:300pt; display:flex; flex-direction:column; gap:12pt; z-index:2;">
    <p class="kicker">Overview</p>
    <h1 class="title">하츠투하츠는 어떤 팀인가</h1>
    <p class="subtitle" style="max-width:255pt;">2025년 2월 24일 데뷔한 SM Entertainment 8인조 걸그룹. 팀명은 팬들과 더 큰 마음을 연결하겠다는 메시지를 담고 있다.</p>

    <div style="display:flex; flex-direction:column; gap:10pt; margin-top:2pt;">
      
        <div style="display:flex; gap:10pt; align-items:flex-start;">
          <div class="dot" style="margin-top:6pt; flex:0 0 auto;"></div>
          <div style="flex:1;">
            <p style="margin:0 0 2pt 0; font-size:9pt; font-weight:700; color:#AA7B94; text-transform:uppercase; letter-spacing:0.08em;">데뷔</p>
            <p style="margin:0; font-size:10.5pt; line-height:1.5; color:#3E333A;">2025.02.24 / 첫 싱글 The Chase</p>
          </div>
        </div>
        <div style="display:flex; gap:10pt; align-items:flex-start;">
          <div class="dot" style="margin-top:6pt; flex:0 0 auto;"></div>
          <div style="flex:1;">
            <p style="margin:0 0 2pt 0; font-size:9pt; font-weight:700; color:#AA7B94; text-transform:uppercase; letter-spacing:0.08em;">구성</p>
            <p style="margin:0; font-size:10.5pt; line-height:1.5; color:#3E333A;">카르멘 · 지우 · 유하 · 스텔라 · 주은 · 에이나 · 이안 · 예온</p>
          </div>
        </div>
        <div style="display:flex; gap:10pt; align-items:flex-start;">
          <div class="dot" style="margin-top:6pt; flex:0 0 auto;"></div>
          <div style="flex:1;">
            <p style="margin:0 0 2pt 0; font-size:9pt; font-weight:700; color:#AA7B94; text-transform:uppercase; letter-spacing:0.08em;">키워드</p>
            <p style="margin:0; font-size:10.5pt; line-height:1.5; color:#3E333A;">mysterious · bright · chemistry</p>
          </div>
        </div>
    </div>
  </div>

  <div style="position:absolute; right:24pt; top:24pt; width:356pt; height:208pt; border-radius:24pt; overflow:hidden; box-shadow:0 18pt 32pt rgba(143, 103, 126, 0.14);">
    <img class="photo" src="./assets/the-chase-group-1.jpg" alt="Hearts2Hearts The Chase 단체 이미지" style="object-position:center 35%;">
  </div>

  <div style="position:absolute; left:28pt; right:28pt; bottom:24pt; padding:14pt 14pt 12pt; background:#FFFFFF; border-radius:22pt; border:1pt solid #F2DDE7; box-shadow:0 10pt 24pt rgba(180, 124, 152, 0.08);">
    <p style="margin:0 0 10pt 0; font-size:8pt; font-weight:700; color:#8B7CFF; letter-spacing:0.12em; text-transform:uppercase;">Member Index</p>
    <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap:10pt; align-items:start;">
      
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/jiwoo.jpg" alt="지우 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">지우</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/carmen.jpg" alt="카르멘 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">카르멘</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/yuha.jpg" alt="유하 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">유하</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/stella.jpg" alt="스텔라 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">스텔라</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/juun.jpg" alt="주은 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">주은</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/a-na.jpg" alt="에이나 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">에이나</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/ian.jpg" alt="이안 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">이안</p>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:5pt;">
          <div style="width:48pt; height:48pt; border-radius:50%; overflow:hidden; border:2pt solid #F5E4EC; box-shadow:0 6pt 14pt rgba(139,124,255,0.08);">
            <img class="photo" src="./assets/ye-on.jpg" alt="예온 사진" style="object-position:center 20%;">
          </div>
          <p style="margin:0; font-size:7.7pt; font-weight:700; color:#564C53;">예온</p>
        </div>
    </div>
  </div>
</div>
</body>
</html>
