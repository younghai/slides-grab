<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>멤버 소개 ①</title>
<style>
  * { box-sizing: border-box; }
  body { width: 720pt; height: 405pt; overflow: hidden; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: #FFF8FC; color: #171217; }
  .slide { width: 720pt; height: 405pt; position: relative; overflow: hidden; background: #FFF8FC; }
  .kicker { font-size: 8.5pt; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #FF5FA2; margin: 0; }
  .title { display:block; font-size: 25pt; line-height: 1.18; letter-spacing: -0.03em; font-weight: 800; margin: 0; color: #171217; padding-bottom: 4pt; }
  .subtitle { font-size: 11pt; line-height: 1.45; color: #6E6371; margin: 0; }
  .chip { display: inline-flex; align-items: center; justify-content: center; padding: 5pt 11pt; border-radius: 999pt; background: #FFFFFF; border: 1pt solid #F1D7E4; }
  .chip p { margin: 0; font-size: 8.5pt; font-weight: 600; color: #6A5260; }
  .footer-note { position: absolute; left: 28pt; bottom: 16pt; font-size: 7.5pt; color: #8A7A85; margin: 0; }
  .photo { width: 100%; height: 100%; object-fit: cover; display: block; }
  .dot { width: 7pt; height: 7pt; border-radius: 50%; background: #FF5FA2; }
</style>
</head>
<body>

<div class="slide">
  <div style="position:absolute; inset:0; background:#FFF8FC;"></div>
  <div style="position:absolute; left:30pt; top:28pt; right:30pt; display:flex; flex-direction:column; gap:8pt;">
    <p class="kicker">Members A</p>
    <h1 class="title">멤버 소개 ①</h1>
    <p class="subtitle">얼굴과 분위기를 함께 기억하기 쉽게, 4명씩 나눠 빠르게 보는 멤버 카드.</p>
  </div>
  <div style="position:absolute; left:30pt; right:30pt; top:108pt; bottom:30pt; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:14pt;">
    
      <div style="display:grid; grid-template-columns:108pt 1fr; gap:12pt; align-items:center; background:#FFFFFF; border:1pt solid #F0DDE6; border-radius:22pt; padding:12pt; box-shadow:0 10pt 22pt rgba(173, 123, 151, 0.09);">
        <div style="width:108pt; height:108pt; border-radius:18pt; overflow:hidden; background:#F7EEF3;">
          <img class="photo" src="./assets/carmen.jpg" alt="카르멘 사진" style="object-position:center 18%;">
        </div>
        <div style="display:flex; flex-direction:column; gap:6pt; justify-content:center;">
          <p style="margin:0; font-size:8pt; letter-spacing:0.12em; font-weight:700; color:#8B7CFF; text-transform:uppercase;">Member</p>
          <h2 style="margin:0; font-size:15pt; line-height:1.15; font-weight:800; color:#171217;">카르멘</h2>
          <p style="margin:0; font-size:9.4pt; line-height:1.55; color:#51444D;">햇살 같은 미소와 따뜻한 에너지가 강점인 멤버. 팀에 밝은 온도를 더한다.</p>
        </div>
      </div>
      <div style="display:grid; grid-template-columns:108pt 1fr; gap:12pt; align-items:center; background:#FFFFFF; border:1pt solid #F0DDE6; border-radius:22pt; padding:12pt; box-shadow:0 10pt 22pt rgba(173, 123, 151, 0.09);">
        <div style="width:108pt; height:108pt; border-radius:18pt; overflow:hidden; background:#F7EEF3;">
          <img class="photo" src="./assets/jiwoo.jpg" alt="지우 사진" style="object-position:center 18%;">
        </div>
        <div style="display:flex; flex-direction:column; gap:6pt; justify-content:center;">
          <p style="margin:0; font-size:8pt; letter-spacing:0.12em; font-weight:700; color:#8B7CFF; text-transform:uppercase;">Member</p>
          <h2 style="margin:0; font-size:15pt; line-height:1.15; font-weight:800; color:#171217;">지우</h2>
          <p style="margin:0; font-size:9.4pt; line-height:1.55; color:#51444D;">리더. 팀의 중심을 차분하게 잡아 주는 안정감 있는 존재.</p>
        </div>
      </div>
      <div style="display:grid; grid-template-columns:108pt 1fr; gap:12pt; align-items:center; background:#FFFFFF; border:1pt solid #F0DDE6; border-radius:22pt; padding:12pt; box-shadow:0 10pt 22pt rgba(173, 123, 151, 0.09);">
        <div style="width:108pt; height:108pt; border-radius:18pt; overflow:hidden; background:#F7EEF3;">
          <img class="photo" src="./assets/yuha.jpg" alt="유하 사진" style="object-position:center 18%;">
        </div>
        <div style="display:flex; flex-direction:column; gap:6pt; justify-content:center;">
          <p style="margin:0; font-size:8pt; letter-spacing:0.12em; font-weight:700; color:#8B7CFF; text-transform:uppercase;">Member</p>
          <h2 style="margin:0; font-size:15pt; line-height:1.15; font-weight:800; color:#171217;">유하</h2>
          <p style="margin:0; font-size:9.4pt; line-height:1.55; color:#51444D;">맑고 섬세한 무드가 돋보이는 멤버. 서정적인 곡 분위기와 잘 어울린다.</p>
        </div>
      </div>
      <div style="display:grid; grid-template-columns:108pt 1fr; gap:12pt; align-items:center; background:#FFFFFF; border:1pt solid #F0DDE6; border-radius:22pt; padding:12pt; box-shadow:0 10pt 22pt rgba(173, 123, 151, 0.09);">
        <div style="width:108pt; height:108pt; border-radius:18pt; overflow:hidden; background:#F7EEF3;">
          <img class="photo" src="./assets/stella.jpg" alt="스텔라 사진" style="object-position:center 18%;">
        </div>
        <div style="display:flex; flex-direction:column; gap:6pt; justify-content:center;">
          <p style="margin:0; font-size:8pt; letter-spacing:0.12em; font-weight:700; color:#8B7CFF; text-transform:uppercase;">Member</p>
          <h2 style="margin:0; font-size:15pt; line-height:1.15; font-weight:800; color:#171217;">스텔라</h2>
          <p style="margin:0; font-size:9.4pt; line-height:1.55; color:#51444D;">세련된 비주얼에 장난기까지 겸한 스타일. 팀 텐션을 띄우는 축 중 하나.</p>
        </div>
      </div>
  </div>
</div>
</body>
</html>
