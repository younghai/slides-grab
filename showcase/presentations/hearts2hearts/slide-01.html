<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>Slide 01</title>
<style>
  * { box-sizing: border-box; }
  body { width: 720pt; height: 405pt; overflow: hidden; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; background: #FFF8FC; color: #171217; }
  .slide { width: 720pt; height: 405pt; position: relative; overflow: hidden; background: #FFF8FC; }
  .kicker { font-size: 8.5pt; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #FF5FA2; margin: 0; }
  .title { display:block; font-size: 25pt; line-height: 1.18; letter-spacing: -0.03em; font-weight: 800; margin: 0; color: #171217; padding-bottom: 4pt; }
  .subtitle { font-size: 11pt; line-height: 1.45; color: #6E6371; margin: 0; }
  .chip { display: inline-flex; align-items: center; justify-content: center; padding: 5pt 11pt; border-radius: 999pt; background: #FFFFFF; border: 1pt solid #F1D7E4; }
  .chip p { margin: 0; font-size: 8.5pt; font-weight: 600; color: #6A5260; }
  .footer-note { position: absolute; left: 28pt; bottom: 16pt; font-size: 7.5pt; color: #8A7A85; margin: 0; }
  .photo { width: 100%; height: 100%; object-fit: cover; display: block; }
  .dot { width: 7pt; height: 7pt; border-radius: 50%; background: #FF5FA2; }
</style>
</head>
<body>

<div class="slide">
  <div style="position:absolute; inset:0; background:#FFF8FC;"></div>
  <div style="position:absolute; width:96pt; height:96pt; border-radius:50%; background:#FFE5F1; top:18pt; left:18pt;"></div>
  <div style="position:absolute; width:88pt; height:88pt; border-radius:50%; background:#EEE9FF; right:286pt; bottom:20pt;"></div>

  <div style="position:absolute; left:34pt; top:34pt; width:290pt; display:flex; flex-direction:column; gap:12pt; z-index:2;">
    <p class="kicker">Hearts2Hearts Guide</p>
    <h1 class="title" style="font-size:31pt;">Hearts2Hearts</h1>
    <p style="margin:0; font-size:16pt; font-weight:700; color:#FF5FA2;">하츠투하츠</p>
    <p class="subtitle" style="font-size:12pt; max-width:250pt;">신비로운 데뷔 무드와 밝은 팀 케미를 함께 가진 SM 8인조 걸그룹.</p>
    <div style="display:flex; flex-wrap:wrap; gap:7pt; margin-top:6pt; max-width:250pt;">
      <div class="chip"><p>카르멘</p></div><div class="chip"><p>지우</p></div><div class="chip"><p>유하</p></div><div class="chip"><p>스텔라</p></div><div class="chip"><p>주은</p></div><div class="chip"><p>에이나</p></div><div class="chip"><p>이안</p></div><div class="chip"><p>예온</p></div>
    </div>
  </div>

  <div style="position:absolute; right:28pt; top:24pt; width:360pt; height:357pt; border-radius:26pt; overflow:hidden; box-shadow:0 18pt 40pt rgba(147,86,120,0.16); border:1pt solid rgba(255,255,255,0.8);">
    <img class="photo" src="./assets/style-group.jpg" alt="Hearts2Hearts 단체 사진" style="object-position:center 35%;">
  </div>

  <div style="position:absolute; left:34pt; bottom:28pt; width:298pt; padding:14pt 16pt; border-radius:18pt; background:rgba(255,255,255,0.78); backdrop-filter: blur(8px); border:1pt solid #F3DCE8; z-index:2;">
    <p style="margin:0 0 6pt 0; font-size:8pt; font-weight:700; letter-spacing:0.12em; color:#8B7CFF; text-transform:uppercase;">Deck Focus</p>
    <p style="margin:0; font-size:10.5pt; line-height:1.55; color:#4E434D;">멤버 전원 얼굴, 입문용 대표곡, 그리고 에이나·이안의 유쾌한 분위기까지 빠르게 훑는 팬 가이드.</p>
  </div>
</div>
</body>
</html>
